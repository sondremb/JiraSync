info:
  name: Check issues against JQL
  type: http
  seq: 9

http:
  method: POST
  url: "{{BaseAddress}}/rest/api/3/jql/match"
  body:
    type: json
    data: |-
      {
        "issueIds": [38098, 23377],
        "jqls": ["project = 'PASP'", "project = 'PASX'"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
